services:

  # ── Middleware ─────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16
    container_name: circleguard-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: circleguard
    ports:
      - "5432:5432"
    volumes:
      - pgdata-test:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d circleguard"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.26
    container_name: circleguard-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_connector_bolt_listen__address: :7687
      NEO4J_dbms_connector_bolt_advertised__address: :7687
    volumes:
      - neo4jdata-test:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: circleguard-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | timeout 2 nc 127.0.0.1 2181 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: circleguard-kafka
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7.2
    container_name: circleguard-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  openldap:
    image: osixia/openldap:1.5.0
    container_name: circleguard-ldap
    ports:
      - "389:389"
      - "636:636"
    environment:
      LDAP_ORGANISATION: "CircleGuard"
      LDAP_DOMAIN: "circleguard.edu"
      LDAP_ADMIN_PASSWORD: "admin"
    healthcheck:
      test: ["CMD-SHELL", "ldapsearch -x -H ldap://localhost -D 'cn=admin,dc=circleguard,dc=edu' -w admin -b 'dc=circleguard,dc=edu' -s base '(objectClass=*)' 2>&1 | head -1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Application Services ───────────────────────────────────────────────────

  auth-service:
    build:
      context: .
      dockerfile: services/circleguard-auth-service/Dockerfile
    container_name: circleguard-auth
    ports:
      - "8180:8180"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/circleguard_auth
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_LDAP_URLS: ldap://openldap:389
      SPRING_LDAP_BASE: dc=circleguard,dc=edu
      SPRING_LDAP_USERNAME: cn=admin,dc=circleguard,dc=edu
      SPRING_LDAP_PASSWORD: admin
      JWT_SECRET: my-super-secret-dev-key-32-chars-long-12345678
      JWT_EXPIRATION: 3600000
      QR_SECRET: my-qr-secret-key-for-dev-1234567890
      QR_EXPIRATION: 300000
    depends_on:
      postgres:
        condition: service_healthy
      openldap:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8180/api/v1/users/permissions/healthcheck || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 40s

  identity-service:
    build:
      context: .
      dockerfile: services/circleguard-identity-service/Dockerfile
    container_name: circleguard-identity
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/circleguard_identity
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: password
      JWT_SECRET: my-super-secret-dev-key-32-chars-long-12345678
      VAULT_SECRET: "746573742d7365637265742d33322d63686172732d6c6f6e672d313233343536"
      VAULT_SALT: "deadbeef"
      VAULT_HASH_SALT: "12345678"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null --header='Content-Type: application/json' --post-data='{\"realIdentity\":\"hc\"}' http://localhost:8083/api/v1/identities/map || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 40s

  promotion-service:
    build:
      context: .
      dockerfile: services/circleguard-promotion-service/Dockerfile
    container_name: circleguard-promotion
    ports:
      - "8088:8088"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/circleguard_promotion
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_NEO4J_URI: bolt://neo4j:7687
      SPRING_NEO4J_AUTHENTICATION_USERNAME: neo4j
      SPRING_NEO4J_AUTHENTICATION_PASSWORD: password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      JWT_SECRET: my-super-secret-dev-key-32-chars-long-12345678
      JWT_EXPIRATION: 3600000
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8088/api/v1/health-status/stats || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

  gateway-service:
    build:
      context: .
      dockerfile: services/circleguard-gateway-service/Dockerfile
    container_name: circleguard-gateway
    ports:
      - "8087:8087"
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      JWT_SECRET: my-super-secret-dev-key-32-chars-long-12345678
      JWT_EXPIRATION: 3600000
      QR_SECRET: my-qr-secret-key-for-dev-1234567890
      QR_EXPIRATION: 300000
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null --header='Content-Type: application/json' --post-data='{\"token\":\"hc\"}' http://localhost:8087/api/v1/gate/validate || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 40s

  notification-service:
    build:
      context: .
      dockerfile: services/circleguard-notification-service/Dockerfile
    container_name: circleguard-notification
    ports:
      - "8082:8082"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_MAIL_HOST: localhost
      SPRING_MAIL_PORT: 25
      AUTH_API_URL: http://auth-service:8180
      JWT_SECRET: my-super-secret-dev-key-32-chars-long-12345678
      QR_SECRET: my-qr-secret-key-for-dev-1234567890
    depends_on:
      kafka:
        condition: service_healthy
      auth-service:
        condition: service_healthy

  form-service:
    build:
      context: .
      dockerfile: services/circleguard-form-service/Dockerfile
    container_name: circleguard-form
    ports:
      - "8086:8086"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/circleguard_form
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8086/api/v1/questionnaires || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 40s

volumes:
  pgdata-test:
  neo4jdata-test:
